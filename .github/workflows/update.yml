name: Generate GEOIP_RU RSC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SINGBOX_VERSION: "1.12.0"

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sing-box
        run: |
          wget -q \
            https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz \
            -O sing-box.tar.gz

          tar -xzf sing-box.tar.gz

          chmod +x sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box

      - name: Download GEOIP RU
        run: |
          wget -q \
            https://raw.githubusercontent.com/SagerNet/sing-geoip/rule-set/geoip-ru.srs \
            -O geoip-ru.srs

      - name: Decompile
        run: |
          ./sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box \
            rule-set decompile \
            --output geoip-ru.json \
            geoip-ru.srs

      - name: Generate RouterOS script
        run: |
          {
            echo "/ip firewall address-list"

            jq -r '.rules[0].ip_cidr[] |
              "add list=GEOIP_RU address=\(.)"' \
              geoip-ru.json

          } > geoip-ru.rsc

      - name: Upload RSC
        uses: actions/upload-artifact@v4
        with:
          name: geoip-ru-rsc
          path: geoip-ru.rsc
